<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080b12" />
    <title>NoteX</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #060709;
      }

      .app-boot-loader {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #060709;
        color: #f1f2f4;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .app-boot-loader__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      .app-boot-loader__spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(241, 242, 244, 0.16);
        border-top-color: #8f70ff;
        border-radius: 999px;
        animation: app-boot-spin 0.8s linear infinite;
      }

      .app-boot-loader__label {
        font-size: 35px;
        font-weight: 700;
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-boot-loader__spinner {
          animation: none;
        }
      }
    </style>
  </head>
