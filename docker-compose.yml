services:
  notex:
    image: ${NOTEX_IMAGE:-ghcr.io/mapherez/notex:latest}
    container_name: notex
    restart: unless-stopped
    ports:
      - "${NOTEX_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /data/notex.sqlite
    volumes:
      - notex-data:/data

volumes:
  notex-data:

